[env:schlitzerei]
platform = espressif32
board = az-delivery-devkit-v4
framework = espidf
monitor_speed = 115200
upload_protocol = esptool
upload_port = /dev/cu.usbserial-0001

; Mesh-sync experiment: two boards, one root (has the mux/pot/buttons and
; drives program/palette/brightness for both) and one node (no physical
; controls, mirrors whatever the root broadcasts over ESP-NOW -- see
; src/mesh/). Physically flash schlitzerei_root to the board keeping the
; mux + first set of bars, schlitzerei_node to the board driving the
; separated bars.
[env:schlitzerei_root]
platform = espressif32
board = az-delivery-devkit-v4
framework = espidf
monitor_speed = 115200
upload_protocol = esptool
build_flags =
    -DMESH_ENABLED
    -DROLE_ROOT

[env:schlitzerei_node]
platform = espressif32
board = az-delivery-devkit-v4
framework = espidf
monitor_speed = 115200
upload_protocol = esptool
build_flags =
    -DMESH_ENABLED
    -DROLE_NODE
