[env:schlitzerei]
platform = espressif32
board = az-delivery-devkit-v4
framework = espidf
monitor_speed = 115200
upload_protocol = esptool
upload_port = /dev/cu.usbserial-0001

; Mesh-sync experiment: two boards, one root (has the mux/pot/buttons and
; drives program/palette/brightness for both) and one node (no physical
; controls, mirrors whatever the root broadcasts over ESP-NOW -- see
; src/mesh/). Physically flash schlitzerei_root to the board keeping the
; mux + first set of bars, schlitzerei_node to the board driving the
; separated bars.
[env:schlitzerei_root]
platform = espressif32
board = az-delivery-devkit-v4
framework = espidf
monitor_speed = 115200
upload_protocol = esptool
build_flags =
    -DMESH_ENABLED
    -DROLE_ROOT

[env:schlitzerei_node]
platform = espressif32
board = az-delivery-devkit-v4
framework = espidf
monitor_speed = 115200
upload_protocol = esptool
build_flags =
    -DMESH_ENABLED
    -DROLE_NODE

; A third, mobile node: one 59-LED strip, no physical controls, just
; mirrors whatever root broadcasts -- see programs.c's CHAIN_NODE
; strip_setup and main.c's CHAIN_NODE LedVizConfig branch. The mesh
; protocol itself (broadcast sync/state) already supports any number of
; nodes with no changes -- this is purely a different strip_setup/pin
; config sharing the same node-side mesh code.
[env:schlitzerei_chain_node]
platform = espressif32
board = az-delivery-devkit-v4
framework = espidf
monitor_speed = 115200
upload_protocol = esptool
build_flags =
    -DMESH_ENABLED
    -DROLE_NODE
    -DCHAIN_NODE
